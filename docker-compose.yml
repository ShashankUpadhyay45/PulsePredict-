services:
  db:
    image: postgres:15
    container_name: pulsepredict-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulsepredict-backend
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgrespassword@db:5432/postgres
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    restart: always

volumes:
  pgdata:
